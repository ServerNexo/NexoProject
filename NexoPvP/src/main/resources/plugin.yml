name: NexoPvP
version: '${project.version}'
main: me.nexo.pvp.NexoPvP
api-version: '1.21'
author: 'TuNombre'
description: 'Sistema de combate y pasivas PvP.'
depend: [NexoCore, NexoProtections, NexoEconomy]
softdepend: [NexoWar]

commands:
  pvp:
    description: Activa o desactiva tu Modo de Guerra
    aliases: [ modo ]
    permission: nexopvp.user
    permission-message: "No tienes permiso para usar este comando."
