name: NexoPvP
version: '${project.version}'
main: me.nexo.pvp.NexoPvP
api-version: '1.21'
author: 'TuNombre'
description: 'Sistema de combate y pasivas PvP.'
depend: [NexoCore, NexoProtections, NexoEconomy]
softdepend: [NexoWar]

# 📚 DICCIONARIO GLOBAL (LuckPerms leerá esto mágicamente)
permissions:
  nexopvp.user:
    description: Permite activar o desactivar el modo PvP.
    default: true # 'true' para que todos lo tengan por defecto, o 'false'/'op'

  nexopvp.admin:
    description: Permisos administrativos del módulo PvP.
    default: op